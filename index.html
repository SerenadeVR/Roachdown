<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roachdown &mdash; SerenadeVR</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #ddd;
      --accent: #c1272d;
      --muted: #888;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 60px 24px 40px;
    }
    h1 {
      font-size: 56px;
      margin: 0 0 4px 0;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .tagline {
      color: var(--muted);
      font-size: 18px;
      margin-bottom: 40px;
    }
    p { line-height: 1.6; }
    a { color: var(--accent); }
    .links {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid #222;
    }
    .links a { display: inline-block; margin-right: 16px; }
    footer {
      margin-top: 60px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Roachdown</h1>
    <div class="tagline">A casual VR shooter by SerenadeVR</div>

    <p>
      Defend an abandoned kitchen from waves of cockroaches.
      Two pistols, shake to reload, endless waves that get harder over time.
      How long can you survive?
    </p>

    <p>
      Built for Meta Quest 2 and 3.
    </p>

    <div class="links">
      <a href="./privacy.html">Privacy Policy</a>
      <a href="mailto:rushgear49@gmail.com">Contact</a>
    </div>

    <footer>
      &copy; SerenadeVR
    </footer>
  </main>
</body>
</html>
